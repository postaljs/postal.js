name: Deploy Docs

on:
    push:
        branches: [master]

concurrency:
    group: deploy-docs
    cancel-in-progress: true

permissions:
    contents: read
    pages: write
    id-token: write

jobs:
    checks:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint, test, and build
              run: pnpm run checks

    build-docs:
        needs: checks
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build docs with demos
              run: pnpm --filter @postal/docs build:full

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: packages/docs/dist

    deploy:
        needs: build-docs
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
